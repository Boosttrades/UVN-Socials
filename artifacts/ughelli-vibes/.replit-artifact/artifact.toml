kind = "mobile"
previewPath = "/"
title = "Ughelli Vibes TV"
version = "1.0.0"
id = "artifacts/ughelli-vibes"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 22685

[services.development]
run = "pnpm --filter @workspace/ughelli-vibes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ughelli-vibes", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ughelli-vibes", "run", "serve" ]

[services.env]
PORT = "22685"
BASE_PATH = "/"
